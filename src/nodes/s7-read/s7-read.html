<script type="text/javascript">
  RED.nodes.registerType('s7-read', {
    category: 'S7',
    color: '#4FC3F7',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 's7-config', required: true },
      address: { value: '' },
      outputMode: { value: 'single' },
      topic: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-download',
    paletteLabel: 'S7 Read',
    label: function () {
      return this.name || this.address || 'S7 Read';
    },
    oneditprepare: function () {
      var node = this;
      $('#s7-browse-btn').on('click', function () {
        var serverId = $('#node-input-server').val();
        if (!serverId) { RED.notify('Select a server first', 'warning'); return; }
        $('#s7-browse-status').text('Browsing...').show();
        $('#s7-browse-results').empty();
        $('#s7-browse-dialog').show();
        $.getJSON('s7-suite/browse/' + serverId, function (data) {
          $('#s7-browse-status').hide();
          var filter = '';
          var addresses = data.addresses || [];
          function render(f) {
            var tbl = $('<table style="width:100%;border-collapse:collapse;font-size:12px;"></table>');
            tbl.append('<tr style="background:#eee;"><th style="padding:4px;text-align:left;">Address</th><th style="padding:4px;">Type</th><th style="padding:4px;">Info</th><th style="padding:4px;"></th></tr>');
            var count = 0;
            addresses.forEach(function (a) {
              if (f && a.address.toLowerCase().indexOf(f.toLowerCase()) === -1 && a.type.toLowerCase().indexOf(f.toLowerCase()) === -1 && (!a.info || a.info.toLowerCase().indexOf(f.toLowerCase()) === -1)) return;
              if (count++ > 200) return;
              var tr = $('<tr style="border-bottom:1px solid #ddd;cursor:pointer;"></tr>');
              tr.append('<td style="padding:3px 4px;font-family:monospace;">' + a.address + '</td>');
              tr.append('<td style="padding:3px 4px;text-align:center;">' + a.type + '</td>');
              tr.append('<td style="padding:3px 4px;color:#666;">' + (a.info || '') + '</td>');
              var btn = $('<button class="red-ui-button red-ui-button-small" style="padding:1px 8px;">Select</button>');
              btn.on('click', function (e) {
                e.stopPropagation();
                var cur = $('#node-input-address').val().trim();
                if (cur) { cur += ' '; }
                $('#node-input-address').val(cur + a.address);
                RED.notify('Added: ' + a.address, 'success');
              });
              var td = $('<td style="padding:3px 4px;"></td>').append(btn);
              tr.append(td);
              tr.on('click', function () { btn.trigger('click'); });
              tbl.append(tr);
            });
            if (count === 0) tbl.append('<tr><td colspan="4" style="padding:8px;color:#999;">No matches</td></tr>');
            if (count > 200) tbl.append('<tr><td colspan="4" style="padding:8px;color:#999;">' + (addresses.length - 200) + ' more... use filter</td></tr>');
            $('#s7-browse-results').empty().append(tbl);
          }
          render('');
          $('#s7-browse-filter').off('input').on('input', function () { render($(this).val()); });
        }).fail(function (xhr) {
          var msg = xhr.responseJSON ? xhr.responseJSON.error : 'Browse failed';
          $('#s7-browse-status').text(msg).css('color', 'red');
        });
      });
      $('#s7-browse-close').on('click', function () { $('#s7-browse-dialog').hide(); });
    }
  });
</script>

<script type="text/html" data-template-name="s7-read">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <div style="display:inline-flex;width:70%;">
      <input type="text" id="node-input-address" placeholder="DB1,REAL0 or DB1.DBD0" style="flex:1;">
      <button type="button" id="s7-browse-btn" class="red-ui-button" style="margin-left:4px;" title="Browse PLC addresses"><i class="fa fa-search"></i></button>
    </div>
  </div>
  <div class="form-row">
    <label for="node-input-outputMode"><i class="fa fa-list"></i> Output</label>
    <select id="node-input-outputMode">
      <option value="single">Single value</option>
      <option value="object">Object (key=address)</option>
    </select>
  </div>
  <div id="s7-browse-dialog" style="display:none;border:1px solid #ccc;border-radius:4px;padding:8px;margin-top:8px;background:#fafafa;max-height:400px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <b><i class="fa fa-sitemap"></i> PLC Address Browser</b>
      <button type="button" id="s7-browse-close" class="red-ui-button red-ui-button-small"><i class="fa fa-times"></i></button>
    </div>
    <input type="text" id="s7-browse-filter" placeholder="Filter (e.g. DB1, REAL, Merker...)" style="width:100%;margin-bottom:6px;padding:4px;">
    <div id="s7-browse-status" style="padding:8px;color:#666;display:none;"></div>
    <div id="s7-browse-results" style="max-height:300px;overflow-y:auto;"></div>
  </div>
  <div class="form-tips">
    <p>Address can be set via <code>msg.topic</code>. Multiple addresses: space-separated.</p>
    <p>Supports nodes7 style (<code>DB1,REAL0</code>) and IEC style (<code>DB1.DBD0</code>).</p>
  </div>
</script>

<script type="text/html" data-help-name="s7-read">
  <p>Reads data from a Siemens S7 PLC.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Overrides the configured address</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The value read from the PLC</dd>
  </dl>
</script>
