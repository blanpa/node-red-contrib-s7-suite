<script type="text/javascript">
  RED.nodes.registerType('s7-read', {
    category: 'S7',
    color: '#4FC3F7',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 's7-config', required: true },
      address: { value: '' },
      labels: { value: '{}' },
      outputMode: { value: 'single' },
      topic: { value: '' },
      schema: { value: '[]' }
    },
    inputs: 1,
    outputs: 1,
    icon: 's7-suite.svg',
    paletteLabel: 'S7 Read',
    label: function () {
      return this.name || this.address || 'S7 Read';
    },
    oneditprepare: function () {
      var node = this;
      s7SuiteStatusDot('#node-input-server', '#s7r-status-dot');

      // editableList for addresses with optional labels
      var addrList = $('#s7r-address-list').css({ 'min-height': '300px', 'min-width': '300px' }).editableList({
        addButton: 'Add address',
        removable: true,
        sortable: true,
        addItem: function (row, index, data) {
          var addrVal = data.address || '';
          var labelVal = data.label || '';
          var container = $('<div style="display:flex;gap:4px;">');
          var addrInput = $('<input type="text" class="s7r-addr" placeholder="DB1,REAL0" style="flex:1;">').val(addrVal);
          var labelInput = $('<input type="text" class="s7r-label" placeholder="Label (optional)" style="flex:1;">').val(labelVal);
          container.append(addrInput, labelInput);
          row.append(container);
        }
      });

      // Load existing addresses with labels
      var existingLabels = {};
      try { existingLabels = JSON.parse(node.labels || '{}'); } catch(e) {}
      var existing = (node.address || '').trim();
      if (existing) {
        var parts = existing.split(/\s+/);
        parts.forEach(function (a) {
          if (a) addrList.editableList('addItem', { address: a, label: existingLabels[a] || '' });
        });
      }

      // CSV/Excel/CFG/TIA-XML import
      var fileInput = $('<input type="file" accept=".csv,.tsv,.txt,.xlsx,.xls,.cfg,.xml" style="display:none;">');
      $('body').append(fileInput);

      $('#s7r-import-btn').on('click', function () {
        fileInput.trigger('click');
      });

      fileInput.on('change', function (evt) {
        var file = evt.target.files[0];
        if (!file) return;
        var name = (file.name || '').toLowerCase();
        var isExcel = /\.(xlsx|xls|xlsm|xlsb|ods)$/i.test(name);
        var isCfg = /\.cfg$/i.test(name);
        var isXml = /\.xml$/i.test(name);

        if (isXml) {
          var xmlReader = new FileReader();
          xmlReader.onload = function (e) {
            try {
              $.ajax({
                url: 's7-suite/tia-xml-import',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ content: e.target.result }),
                success: function (result) {
                  var tags = (result && result.tags) || [];
                  var usable = tags.filter(function (t) { return t.address; });
                  if (usable.length === 0) {
                    RED.notify('No addressed tags found in "' + file.name + '". User constants are skipped (no address).', 'warning');
                  } else {
                    usable.forEach(function (t) {
                      addrList.editableList('addItem', { address: t.address, label: t.name });
                    });
                    var tableLabel = (result.tables || []).length > 0
                      ? ' (' + result.tables.length + ' table' + (result.tables.length > 1 ? 's' : '') + ')'
                      : '';
                    RED.notify('Imported ' + usable.length + ' tag(s) from "' + file.name + '"' + tableLabel + '.', 'success');
                  }
                },
                error: function (xhr) {
                  var msg = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'Server-side parse failed';
                  RED.notify('Failed to import TIA XML: ' + msg, 'error');
                }
              });
            } catch (parseErr) {
              RED.notify('Failed to read XML file: ' + parseErr.message, 'error');
            }
            fileInput.val('');
          };
          xmlReader.readAsText(file, 'utf-8');
          return;
        }

        if (isCfg) {
          var cfgReader = new FileReader();
          cfgReader.onload = function (e) {
            try {
              // STEP 7 cfg exports are latin1; decode accordingly to preserve umlauts.
              var buf = new Uint8Array(e.target.result);
              var text;
              try {
                text = new TextDecoder('windows-1252').decode(buf);
              } catch (_decErr) {
                text = new TextDecoder('iso-8859-15').decode(buf);
              }
              $.ajax({
                url: 's7-suite/cfg-import',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ content: text }),
                success: function (result) {
                  var tags = (result && result.tags) || [];
                  if (tags.length === 0) {
                    RED.notify('No symbols found in "' + file.name + '". Make sure SYMBOLs are included in the STEP 7 export.', 'warning');
                  } else {
                    tags.forEach(function (t) {
                      addrList.editableList('addItem', { address: t.address, label: t.name });
                    });
                    var stationLabel = result.station ? (' (' + result.station.name + ')') : '';
                    RED.notify('Imported ' + tags.length + ' tag(s) from "' + file.name + '"' + stationLabel + '.', 'success');
                  }
                },
                error: function (xhr) {
                  var msg = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'Server-side parse failed';
                  RED.notify('Failed to import cfg: ' + msg, 'error');
                }
              });
            } catch (parseErr) {
              RED.notify('Failed to read cfg file: ' + parseErr.message, 'error');
            }
            fileInput.val('');
          };
          cfgReader.readAsArrayBuffer(file);
          return;
        }

        if (isExcel) {
          loadSheetJS(function (err, XLSX) {
            if (err || !XLSX) {
              RED.notify('Excel import requires SheetJS. Could not load library: ' + (err && err.message ? err.message : 'unknown error'), 'error');
              fileInput.val('');
              return;
            }
            var reader = new FileReader();
            reader.onload = function (e) {
              try {
                var data = new Uint8Array(e.target.result);
                var wb = XLSX.read(data, { type: 'array' });
                var sheetName = wb.SheetNames[0];
                var ws = wb.Sheets[sheetName];
                // Convert to CSV string and reuse the existing parser
                var csv = XLSX.utils.sheet_to_csv(ws, { FS: ';' });
                var imported = parseTagListCSV(csv);
                if (imported.length === 0) {
                  RED.notify('No tags found in Excel sheet "' + sheetName + '". Expected columns: name/symbol/tag and address.', 'warning');
                } else {
                  imported.forEach(function (item) { addrList.editableList('addItem', item); });
                  RED.notify('Imported ' + imported.length + ' tag(s) from "' + file.name + '".', 'success');
                }
              } catch (parseErr) {
                RED.notify('Failed to parse Excel file: ' + parseErr.message, 'error');
              }
              fileInput.val('');
            };
            reader.readAsArrayBuffer(file);
          });
        } else {
          var reader = new FileReader();
          reader.onload = function (e) {
            var text = e.target.result;
            var imported = parseTagListCSV(text);
            if (imported.length === 0) {
              RED.notify('No tags found. Expected a header row with columns: name/symbol/tag and address.', 'warning');
            } else {
              imported.forEach(function (item) { addrList.editableList('addItem', item); });
              RED.notify('Imported ' + imported.length + ' tag(s) from "' + file.name + '".', 'success');
            }
            fileInput.val('');
          };
          reader.readAsText(file);
        }
      });

      // Lazy-load SheetJS from CDN (no runtime npm dependency)
      var _sheetJsLoading = null;
      function loadSheetJS(callback) {
        if (typeof window.XLSX !== 'undefined') {
          callback(null, window.XLSX);
          return;
        }
        if (_sheetJsLoading) {
          _sheetJsLoading.push(callback);
          return;
        }
        _sheetJsLoading = [callback];
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
        script.onload = function () {
          var cbs = _sheetJsLoading || [];
          _sheetJsLoading = null;
          cbs.forEach(function (cb) { cb(null, window.XLSX); });
        };
        script.onerror = function () {
          var cbs = _sheetJsLoading || [];
          _sheetJsLoading = null;
          cbs.forEach(function (cb) { cb(new Error('Failed to load SheetJS from CDN. Check your internet connection or export the file as CSV.')); });
        };
        document.head.appendChild(script);
      }

      // Parse CSV/TSV tag lists (TIA Portal, Step 7, generic)
      function parseTagListCSV(text) {
        var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
        if (lines.length < 2) return [];

        // Detect separator: tab, semicolon, or comma
        var sep = '\t';
        var header = lines[0];
        if (header.indexOf('\t') >= 0) sep = '\t';
        else if (header.indexOf(';') >= 0) sep = ';';
        else sep = ',';

        var cols = header.split(sep).map(function (c) { return c.trim().replace(/^["']|["']$/g, '').toLowerCase(); });

        // Find relevant columns by common names
        var nameIdx = findCol(cols, ['name', 'symbol', 'tag', 'tagname', 'tag name', 'bezeichnung']);
        var addrIdx = findCol(cols, ['address', 'logical address', 'logische adresse', 'adresse', 'operand', 'plc tag', 'absolute address']);
        var typeIdx = findCol(cols, ['data type', 'datatype', 'type', 'datentyp', 'typ']);

        if (addrIdx < 0) return [];

        var results = [];
        for (var i = 1; i < lines.length; i++) {
          var fields = lines[i].split(sep).map(function (c) { return c.trim().replace(/^["']|["']$/g, ''); });
          var addr = fields[addrIdx] || '';
          if (!addr) continue;

          // Convert IEC format (%DB1.DBD0 -> DB1.DBD0, %MW10 -> MW10)
          addr = addr.replace(/^%/, '');

          // Convert IEC I/Q prefix to nodes7 format if needed
          // %IW0 -> IW0, %QD4 -> QD4 (these are already valid)

          var label = nameIdx >= 0 ? (fields[nameIdx] || '') : '';

          results.push({ address: addr, label: label });
        }
        return results;
      }

      function findCol(cols, names) {
        for (var n = 0; n < names.length; n++) {
          for (var c = 0; c < cols.length; c++) {
            if (cols[c] === names[n]) return c;
          }
        }
        return -1;
      }

      // Browse dialog - appends to list
      s7SuiteBrowseDialog({
        btnId: '#s7r-browse-btn',
        closeId: '#s7r-browse-close',
        filterId: '#s7r-browse-filter',
        statusId: '#s7r-browse-status',
        resultsId: '#s7r-browse-results',
        dialogId: '#s7r-browse-dialog',
        serverId: '#node-input-server',
        addressId: null,
        mode: 'list',
        listRef: addrList,
        refreshId: '#s7r-browse-refresh'
      });

      // Schema editableList for struct mode
      var S7_TYPES = ['BOOL','BYTE','WORD','DWORD','INT','DINT','REAL','LREAL','CHAR','STRING'];
      var schemaList = $('#s7r-schema-list').css({ 'min-height': '250px', 'min-width': '300px' }).editableList({
        addButton: 'Add field',
        removable: true,
        sortable: true,
        addItem: function (row, index, data) {
          var nameInput = $('<input type="text" placeholder="Field name" style="width:22%;">').val(data.name || '');
          var typeSelect = $('<select style="width:22%;margin-left:2%;">');
          S7_TYPES.forEach(function(t) {
            typeSelect.append($('<option>').val(t).text(t));
          });
          typeSelect.val(data.type || 'REAL');
          var offsetInput = $('<input type="number" placeholder="Offset" style="width:18%;margin-left:2%;" min="0">').val(data.offset != null ? data.offset : '');
          var bitInput = $('<input type="number" placeholder="Bit" style="width:14%;margin-left:2%;" min="0" max="7">').val(data.bit != null ? data.bit : '');
          var lenInput = $('<input type="number" placeholder="Str len" style="width:14%;margin-left:2%;" min="1">').val(data.length != null ? data.length : '');

          function updateVisibility() {
            var t = typeSelect.val();
            bitInput.toggle(t === 'BOOL');
            lenInput.toggle(t === 'STRING');
          }
          typeSelect.on('change', updateVisibility);

          row.append(nameInput, typeSelect, offsetInput, bitInput, lenInput);
          updateVisibility();
        }
      });

      // Load existing schema
      try {
        var schemaArr = JSON.parse(node.schema || '[]');
        if (Array.isArray(schemaArr)) {
          schemaArr.forEach(function (f) {
            schemaList.editableList('addItem', f);
          });
        }
      } catch (e) { /* ignore */ }

      // Toggle UI sections based on outputMode
      function updateModeUI() {
        var mode = $('#node-input-outputMode').val();
        var isAddressList = (mode === 'single' || mode === 'object');
        $('#s7r-address-list-section').toggle(isAddressList);
        $('#s7r-single-address-section').toggle(!isAddressList);
        $('#s7r-schema-section').toggle(mode === 'struct');
        $('#s7r-buffer-hint').toggle(mode === 'buffer');
        $('#s7r-bits-hint').toggle(mode === 'bits');
        $('#s7r-struct-hint').toggle(mode === 'struct');
      }

      $('#node-input-outputMode').on('change', updateModeUI);

      // For buffer/struct/bits modes, show a single address input
      // Pre-fill single address from first address in list
      if (!isAddressListMode(node.outputMode)) {
        var firstAddr = (node.address || '').split(/\s+/)[0] || '';
        $('#s7r-single-address-input').val(firstAddr);
      }

      function isAddressListMode(mode) {
        return mode === 'single' || mode === 'object' || !mode;
      }

      updateModeUI();
    },
    oneditresize: function (size) {
      // Make the address/schema lists grow with the dialog height
      var rowHeight = 80;
      var listHeight = Math.max(200, size.height - rowHeight - 280);
      $('#s7r-address-list').css('height', listHeight + 'px');
      $('#s7r-schema-list').css('height', listHeight + 'px');
    },
    oneditsave: function () {
      var mode = $('#node-input-outputMode').val();

      if (mode === 'single' || mode === 'object') {
        // Collect addresses and labels from editableList
        var items = $('#s7r-address-list').editableList('items');
        var addresses = [];
        var labelMap = {};
        items.each(function () {
          var addr = $(this).find('.s7r-addr').val();
          var label = $(this).find('.s7r-label').val();
          if (addr && addr.trim()) {
            addresses.push(addr.trim());
            if (label && label.trim()) {
              labelMap[addr.trim()] = label.trim();
            }
          }
        });
        this.address = addresses.join(' ');
        this.labels = JSON.stringify(labelMap);
      } else {
        // Single address for buffer/struct/bits
        this.address = ($('#s7r-single-address-input').val() || '').trim();
      }

      // Save schema
      if (mode === 'struct') {
        var schemaItems = $('#s7r-schema-list').editableList('items');
        var schema = [];
        schemaItems.each(function () {
          var inputs = $(this).find('input');
          var select = $(this).find('select');
          var name = $(inputs[0]).val();
          var type = select.val();
          var offset = parseInt($(inputs[1]).val(), 10);
          var bit = $(inputs[2]).val();
          var len = $(inputs[3]).val();
          if (name && !isNaN(offset)) {
            var field = { name: name, type: type, offset: offset };
            if (type === 'BOOL' && bit !== '') field.bit = parseInt(bit, 10);
            if (type === 'STRING' && len !== '') field.length = parseInt(len, 10);
            schema.push(field);
          }
        });
        this.schema = JSON.stringify(schema);
      }
    }
  });
</script>

<script type="text/html" data-template-name="s7-read">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <div style="display:inline-flex;width:70%;align-items:center;">
      <input type="text" id="node-input-server" style="flex:1;">
      <span id="s7r-status-dot" style="width:12px;height:12px;border-radius:50%;background:#999;display:inline-block;margin-left:6px;flex-shrink:0;" title="Connection status"></span>
    </div>
  </div>
  <div class="form-row">
    <label for="node-input-outputMode"><i class="fa fa-list"></i> Output</label>
    <select id="node-input-outputMode">
      <option value="single">Single value</option>
      <option value="object">Object (key=address)</option>
      <option value="buffer">Raw Buffer</option>
      <option value="struct">Struct (schema)</option>
      <option value="bits">Bit Array</option>
    </select>
  </div>
  <div id="s7r-address-list-section">
    <div class="form-row">
      <label style="vertical-align:top;"><i class="fa fa-map-marker"></i> Addresses</label>
      <div style="display:inline-block;width:70%;">
        <div style="margin-bottom:4px;">
          <button type="button" id="s7r-browse-btn" class="red-ui-button red-ui-button-small" title="Browse PLC addresses"><i class="fa fa-search"></i> Browse</button>
          <button type="button" id="s7r-import-btn" class="red-ui-button red-ui-button-small" title="Import tag list from CSV, Excel, STEP 7 .cfg hardware export, or TIA Portal .xml tag-table export"><i class="fa fa-upload"></i> Import CSV/Excel/CFG/XML</button>
        </div>
        <ol id="s7r-address-list"></ol>
      </div>
    </div>
  </div>
  <div id="s7r-single-address-section" style="display:none;">
    <div class="form-row">
      <label for="s7r-single-address-input"><i class="fa fa-map-marker"></i> Address</label>
      <input type="text" id="s7r-single-address-input" placeholder="DB1,BYTE0.0.100" style="width:70%;">
    </div>
  </div>
  <div id="s7r-buffer-hint" style="display:none;" class="form-tips">
    <p>Reads raw bytes from the PLC. Use <code>DB1,BYTE0.0.100</code> to read 100 bytes from DB1 offset 0.</p>
    <p><code>msg.payload</code> will be a Node.js <code>Buffer</code>.</p>
  </div>
  <div id="s7r-bits-hint" style="display:none;" class="form-tips">
    <p>Reads bytes and unpacks them into a boolean array (LSB first).</p>
    <p>Use <code>DB1,BYTE0.0.2</code> to read 2 bytes = 16 bits. <code>msg.payload</code> will be <code>[true, false, ...]</code>.</p>
  </div>
  <div id="s7r-struct-hint" style="display:none;" class="form-tips">
    <p>Reads a data block area and extracts fields according to the schema below.</p>
    <p>The address field specifies the DB (e.g. <code>DB1,BYTE0</code>). Schema can be overridden at runtime via <code>msg.schema</code>.</p>
  </div>
  <div id="s7r-schema-section" style="display:none;">
    <div class="form-row">
      <label style="vertical-align:top;"><i class="fa fa-th-list"></i> Schema</label>
      <div style="display:inline-block;width:70%;">
        <ol id="s7r-schema-list"></ol>
      </div>
    </div>
  </div>
  <!-- Hidden fields -->
  <input type="hidden" id="node-input-address">
  <input type="hidden" id="node-input-labels">
  <input type="hidden" id="node-input-schema">
  <div id="s7r-browse-dialog" style="display:none;border:1px solid #ccc;border-radius:4px;padding:8px;margin-top:8px;background:#fafafa;max-height:400px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <b><i class="fa fa-sitemap"></i> PLC Address Browser</b>
      <div>
        <button type="button" id="s7r-browse-refresh" class="red-ui-button red-ui-button-small" style="margin-right:4px;"><i class="fa fa-refresh"></i></button>
        <button type="button" id="s7r-browse-close" class="red-ui-button red-ui-button-small"><i class="fa fa-times"></i></button>
      </div>
    </div>
    <input type="text" id="s7r-browse-filter" placeholder="Filter (e.g. DB1, REAL, Merker...)" style="width:100%;margin-bottom:6px;padding:4px;">
    <div id="s7r-browse-status" style="padding:8px;color:#666;display:none;"></div>
    <div id="s7r-browse-results" style="max-height:300px;overflow-y:auto;"></div>
  </div>
</script>

<script type="text/html" data-help-name="s7-read">
  <p>Reads data from a Siemens S7 PLC.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Overrides the configured address</dd>
    <dt class="optional">schema <span class="property-type">array</span></dt>
    <dd>Overrides the configured schema (struct mode only)</dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The value read from the PLC (type depends on output mode)</dd>
  </dl>
  <h3>Output Modes</h3>
  <dl>
    <dt>Single value</dt>
    <dd>Reads one address and returns the scalar value.</dd>
    <dt>Object</dt>
    <dd>Reads one or more addresses and returns an object. Keys are the label (if set) or address. Use <b>Import CSV/Excel/CFG/XML</b> to bulk-import tag lists from TIA Portal (.xlsx or tag-table .xml), Step 7 symbol exports (.csv/.tsv), or STEP 7 V5 hardware configuration exports (.cfg). The CSV importer auto-detects column names (<code>name</code>/<code>symbol</code>/<code>tag</code> and <code>address</code>) and supports tab, semicolon and comma separators. IEC-style addresses with <code>%</code> prefix are converted automatically.<br>
    <b>.cfg import</b> reads the full hardware config exported from SIMATIC Manager via <em>Station → Export…</em> and extracts all symbolic I/O — including modules behind Profibus/Profinet couplers that a live browse cannot discover. Digital inputs/outputs become <code>I0.3</code>/<code>Q0.3</code> addresses, analog channels become <code>IW272</code>/<code>QW272</code>.<br>
    <b>TIA Portal .xml import</b> reads a PLC tag-table exported from TIA Portal (V13+) via <em>PLC tags → &lt;table&gt; → Export</em>. Multilingual comments prefer <code>de-DE</code>, then <code>en-US</code>. User constants (no address) are skipped.</dd>
    <dt>Raw Buffer</dt>
    <dd>Reads N bytes and returns a Node.js Buffer. Address format: <code>DB1,BYTE0.0.100</code> (100 bytes from offset 0). Useful for JSON strings in DBs or custom binary parsing.</dd>
    <dt>Struct (schema)</dt>
    <dd>Reads a raw buffer area and extracts typed fields according to a schema. Each field specifies name, data type, and byte offset. Example schema:
    <pre>[{"name":"temp","type":"REAL","offset":0},
 {"name":"count","type":"INT","offset":4},
 {"name":"active","type":"BOOL","offset":6,"bit":0}]</pre>
    Returns: <code>{"temp":23.5,"count":42,"active":true}</code></dd>
    <dt>Bit Array</dt>
    <dd>Reads N bytes and returns an array of booleans (LSB first per byte). Address format: <code>DB1,BYTE0.0.2</code> (2 bytes = 16 bits). Useful for status words and bitmasks.</dd>
  </dl>
</script>
