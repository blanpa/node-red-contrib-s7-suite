<script type="text/javascript">
  RED.nodes.registerType('s7-write', {
    category: 'S7',
    color: '#4FC3F7',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 's7-config', required: true },
      address: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-upload',
    paletteLabel: 'S7 Write',
    label: function () {
      return this.name || this.address || 'S7 Write';
    },
    oneditprepare: function () {
      $('#s7w-browse-btn').on('click', function () {
        var serverId = $('#node-input-server').val();
        if (!serverId) { RED.notify('Select a server first', 'warning'); return; }
        $('#s7w-browse-status').text('Browsing...').show();
        $('#s7w-browse-results').empty();
        $('#s7w-browse-dialog').show();
        $.getJSON('s7-suite/browse/' + serverId, function (data) {
          $('#s7w-browse-status').hide();
          var addresses = data.addresses || [];
          function render(f) {
            var tbl = $('<table style="width:100%;border-collapse:collapse;font-size:12px;"></table>');
            tbl.append('<tr style="background:#eee;"><th style="padding:4px;text-align:left;">Address</th><th style="padding:4px;">Type</th><th style="padding:4px;">Info</th><th style="padding:4px;"></th></tr>');
            var count = 0;
            addresses.forEach(function (a) {
              if (f && a.address.toLowerCase().indexOf(f.toLowerCase()) === -1 && a.type.toLowerCase().indexOf(f.toLowerCase()) === -1 && (!a.info || a.info.toLowerCase().indexOf(f.toLowerCase()) === -1)) return;
              if (count++ > 200) return;
              var tr = $('<tr style="border-bottom:1px solid #ddd;cursor:pointer;"></tr>');
              tr.append('<td style="padding:3px 4px;font-family:monospace;">' + a.address + '</td>');
              tr.append('<td style="padding:3px 4px;text-align:center;">' + a.type + '</td>');
              tr.append('<td style="padding:3px 4px;color:#666;">' + (a.info || '') + '</td>');
              var btn = $('<button class="red-ui-button red-ui-button-small" style="padding:1px 8px;">Select</button>');
              btn.on('click', function (e) {
                e.stopPropagation();
                $('#node-input-address').val(a.address);
                $('#s7w-browse-dialog').hide();
              });
              var td = $('<td style="padding:3px 4px;"></td>').append(btn);
              tr.append(td);
              tr.on('click', function () { btn.trigger('click'); });
              tbl.append(tr);
            });
            if (count === 0) tbl.append('<tr><td colspan="4" style="padding:8px;color:#999;">No matches</td></tr>');
            if (count > 200) tbl.append('<tr><td colspan="4" style="padding:8px;color:#999;">' + (addresses.length - 200) + ' more... use filter</td></tr>');
            $('#s7w-browse-results').empty().append(tbl);
          }
          render('');
          $('#s7w-browse-filter').off('input').on('input', function () { render($(this).val()); });
        }).fail(function (xhr) {
          var msg = xhr.responseJSON ? xhr.responseJSON.error : 'Browse failed';
          $('#s7w-browse-status').text(msg).css('color', 'red');
        });
      });
      $('#s7w-browse-close').on('click', function () { $('#s7w-browse-dialog').hide(); });
    }
  });
</script>

<script type="text/html" data-template-name="s7-write">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <div style="display:inline-flex;width:70%;">
      <input type="text" id="node-input-address" placeholder="DB1,REAL0 or DB1.DBD0" style="flex:1;">
      <button type="button" id="s7w-browse-btn" class="red-ui-button" style="margin-left:4px;" title="Browse PLC addresses"><i class="fa fa-search"></i></button>
    </div>
  </div>
  <div id="s7w-browse-dialog" style="display:none;border:1px solid #ccc;border-radius:4px;padding:8px;margin-top:8px;background:#fafafa;max-height:400px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <b><i class="fa fa-sitemap"></i> PLC Address Browser</b>
      <button type="button" id="s7w-browse-close" class="red-ui-button red-ui-button-small"><i class="fa fa-times"></i></button>
    </div>
    <input type="text" id="s7w-browse-filter" placeholder="Filter (e.g. DB1, REAL, Merker...)" style="width:100%;margin-bottom:6px;padding:4px;">
    <div id="s7w-browse-status" style="padding:8px;color:#666;display:none;"></div>
    <div id="s7w-browse-results" style="max-height:300px;overflow-y:auto;"></div>
  </div>
  <div class="form-tips">
    <p>Writes <code>msg.payload</code> to the specified address. Address can be overridden via <code>msg.topic</code>.</p>
  </div>
</script>

<script type="text/html" data-help-name="s7-write">
  <p>Writes data to a Siemens S7 PLC.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The value to write to the PLC</dd>
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Overrides the configured address</dd>
  </dl>
</script>
