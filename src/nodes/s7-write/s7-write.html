<script type="text/javascript">
  RED.nodes.registerType('s7-write', {
    category: 'S7',
    color: '#4FC3F7',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 's7-config', required: true },
      address: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 's7-suite.svg',
    paletteLabel: 'S7 Write',
    label: function () {
      return this.name || this.address || 'S7 Write';
    },
    oneditprepare: function () {
      s7SuiteStatusDot('#node-input-server', '#s7w-status-dot');
      s7SuiteBrowseDialog({
        btnId: '#s7w-browse-btn',
        closeId: '#s7w-browse-close',
        filterId: '#s7w-browse-filter',
        statusId: '#s7w-browse-status',
        resultsId: '#s7w-browse-results',
        dialogId: '#s7w-browse-dialog',
        serverId: '#node-input-server',
        addressId: '#node-input-address',
        mode: 'replace'
      });
    }
  });
</script>

<script type="text/html" data-template-name="s7-write">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <div style="display:inline-flex;width:70%;align-items:center;">
      <input type="text" id="node-input-server" style="flex:1;">
      <span id="s7w-status-dot" style="width:12px;height:12px;border-radius:50%;background:#999;display:inline-block;margin-left:6px;flex-shrink:0;" title="Connection status"></span>
    </div>
  </div>
  <div class="form-row">
    <label for="node-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <div style="display:inline-flex;width:70%;">
      <input type="text" id="node-input-address" placeholder="DB1,REAL0 or DB1.DBD0" style="flex:1;">
      <button type="button" id="s7w-browse-btn" class="red-ui-button" style="margin-left:4px;" title="Browse PLC addresses"><i class="fa fa-search"></i></button>
    </div>
  </div>
  <div id="s7w-browse-dialog" style="display:none;border:1px solid #ccc;border-radius:4px;padding:8px;margin-top:8px;background:#fafafa;max-height:400px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <b><i class="fa fa-sitemap"></i> PLC Address Browser</b>
      <button type="button" id="s7w-browse-close" class="red-ui-button red-ui-button-small"><i class="fa fa-times"></i></button>
    </div>
    <input type="text" id="s7w-browse-filter" placeholder="Filter (e.g. DB1, REAL, Merker...)" style="width:100%;margin-bottom:6px;padding:4px;">
    <div id="s7w-browse-status" style="padding:8px;color:#666;display:none;"></div>
    <div id="s7w-browse-results" style="max-height:300px;overflow-y:auto;"></div>
  </div>
  <div class="form-tips">
    <p>Writes <code>msg.payload</code> to the specified address. Address can be overridden via <code>msg.topic</code>.</p>
  </div>
</script>

<script type="text/html" data-help-name="s7-write">
  <p>Writes data to a Siemens S7 PLC.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The value to write to the PLC</dd>
    <dt class="optional">topic <span class="property-type">string</span></dt>
    <dd>Overrides the configured address</dd>
  </dl>
</script>
