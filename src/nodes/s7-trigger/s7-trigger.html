<script type="text/javascript">
  RED.nodes.registerType('s7-trigger', {
    category: 'S7',
    color: '#4FC3F7',
    defaults: {
      name: { value: '' },
      server: { value: '', type: 's7-config', required: true },
      address: { value: '', required: true },
      interval: { value: 1000, validate: RED.validators.number() },
      edgeMode: { value: 'any' },
      deadband: { value: 0, validate: RED.validators.number() }
    },
    inputs: 0,
    outputs: 1,
    icon: 'font-awesome/fa-bolt',
    paletteLabel: 'S7 Trigger',
    label: function () {
      return this.name || this.address || 'S7 Trigger';
    }
  });
</script>

<script type="text/html" data-template-name="s7-trigger">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
    <input type="text" id="node-input-server">
  </div>
  <div class="form-row">
    <label for="node-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <input type="text" id="node-input-address" placeholder="DB1,BOOL0.0">
  </div>
  <div class="form-row">
    <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval (ms)</label>
    <input type="number" id="node-input-interval" placeholder="1000">
  </div>
  <div class="form-row">
    <label for="node-input-edgeMode"><i class="fa fa-line-chart"></i> Edge Mode</label>
    <select id="node-input-edgeMode">
      <option value="any">Any change</option>
      <option value="rising">Rising edge</option>
      <option value="falling">Falling edge</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-deadband"><i class="fa fa-sliders"></i> Deadband</label>
    <input type="number" id="node-input-deadband" placeholder="0" step="0.1">
  </div>
  <div class="form-tips">
    <p>Polls the specified address(es) and emits a message when the value changes.</p>
    <p>Edge mode applies to boolean values. Deadband applies to numeric values.</p>
  </div>
</script>

<script type="text/html" data-help-name="s7-trigger">
  <p>Polls a Siemens S7 PLC address and triggers on value changes.</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">any</span></dt>
    <dd>The new value</dd>
    <dt>topic <span class="property-type">string</span></dt>
    <dd>The address that changed</dd>
    <dt>oldValue <span class="property-type">any</span></dt>
    <dd>The previous value</dd>
  </dl>
</script>
