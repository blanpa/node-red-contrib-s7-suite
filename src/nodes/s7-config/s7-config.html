<script type="text/javascript">
  // ===== Shared S7 Suite functions (loaded once via config node) =====

  // Connection status dot - polls state every 3s while editor is open
  window.s7SuiteStatusDot = function (serverSelectId, dotId) {
    var interval = null;
    function update() {
      var id = $(serverSelectId).val();
      if (!id) { $(dotId).css('background', '#999').attr('title', 'No server selected'); return; }
      $.getJSON('s7-suite/connection-state/' + id, function (data) {
        var colors = { connected: '#4CAF50', connecting: '#FFC107', reconnecting: '#FFC107', error: '#F44336', disconnected: '#999' };
        $(dotId).css('background', colors[data.state] || '#999').attr('title', data.state || 'unknown');
      }).fail(function () {
        $(dotId).css('background', '#999').attr('title', 'unknown');
      });
    }
    update();
    interval = setInterval(update, 3000);
    $(serverSelectId).on('change', update);
    // Cleanup when editor closes (RED will destroy elements)
    setTimeout(function () {
      var check = setInterval(function () {
        if ($(dotId).length === 0) { clearInterval(interval); clearInterval(check); }
      }, 2000);
    }, 1000);
  };

  // Browse dialog with tree/category structure
  // opts: { btnId, closeId, filterId, statusId, resultsId, dialogId, serverId, addressId, mode: 'replace'|'append'|'list', listRef }
  window.s7SuiteBrowseDialog = function (opts) {
    $(opts.btnId).on('click', function () {
      var serverId = $(opts.serverId).val();
      if (!serverId) { RED.notify('Select a server first', 'warning'); return; }
      $(opts.statusId).text('Browsing...').css('color', '#666').show();
      $(opts.resultsId).empty();
      $(opts.dialogId).show();
      $.getJSON('s7-suite/browse/' + serverId, function (data) {
        $(opts.statusId).hide();
        var addresses = data.addresses || [];

        // Group into categories
        var groups = {};
        addresses.forEach(function (a) {
          var cat = a.info || 'Other';
          // Extract DB name for grouping: "DB1 (100 bytes)" -> "DB1"
          var m = cat.match(/^(DB\d+)/);
          if (m) cat = m[1] + ' (' + (a.info || '') + ')';
          else if (cat === 'Merker') cat = 'Merker (M)';
          else if (cat === 'Input') cat = 'Inputs (I)';
          else if (cat === 'Output') cat = 'Outputs (Q)';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(a);
        });

        function selectAddress(addr) {
          if (opts.mode === 'list' && opts.listRef) {
            opts.listRef.editableList('addItem', { address: addr });
            RED.notify('Added: ' + addr, 'success');
          } else if (opts.mode === 'append') {
            var cur = $(opts.addressId).val().trim();
            if (cur) cur += ' ';
            $(opts.addressId).val(cur + addr);
            RED.notify('Added: ' + addr, 'success');
          } else {
            $(opts.addressId).val(addr);
            $(opts.dialogId).hide();
          }
        }

        function render(f) {
          var container = $('<div></div>');
          var totalCount = 0;
          var sortedKeys = Object.keys(groups).sort(function (a, b) {
            // DBs first (sorted numerically), then M, I, Q
            var da = a.match(/^DB(\d+)/), db2 = b.match(/^DB(\d+)/);
            if (da && db2) return parseInt(da[1]) - parseInt(db2[1]);
            if (da) return -1;
            if (db2) return 1;
            return a.localeCompare(b);
          });

          sortedKeys.forEach(function (cat) {
            var items = groups[cat];
            var filtered = f ? items.filter(function (a) {
              return a.address.toLowerCase().indexOf(f.toLowerCase()) !== -1 ||
                     a.type.toLowerCase().indexOf(f.toLowerCase()) !== -1 ||
                     (a.info && a.info.toLowerCase().indexOf(f.toLowerCase()) !== -1);
            }) : items;
            if (filtered.length === 0) return;

            // Category header (collapsible)
            var section = $('<div style="margin-bottom:2px;"></div>');
            var header = $('<div style="background:#e3f2fd;padding:4px 8px;cursor:pointer;border-radius:3px;font-weight:bold;font-size:12px;display:flex;align-items:center;user-select:none;"></div>');
            var arrow = $('<i class="fa fa-caret-right" style="margin-right:6px;width:10px;transition:transform 0.2s;"></i>');
            header.append(arrow);
            header.append('<span>' + cat + ' <span style="color:#888;font-weight:normal;">(' + filtered.length + ')</span></span>');
            section.append(header);

            var body = $('<div style="display:none;"></div>');
            var tbl = $('<table style="width:100%;border-collapse:collapse;font-size:12px;"></table>');

            var shown = 0;
            filtered.forEach(function (a) {
              if (shown++ >= 100) return;
              totalCount++;
              var tr = $('<tr style="border-bottom:1px solid #eee;cursor:pointer;"></tr>');
              tr.on('mouseover', function () { $(this).css('background', '#f5f5f5'); });
              tr.on('mouseout', function () { $(this).css('background', ''); });
              tr.append('<td style="padding:2px 4px;font-family:monospace;font-size:11px;">' + a.address + '</td>');
              tr.append('<td style="padding:2px 4px;text-align:center;color:#1565C0;font-size:11px;">' + a.type + '</td>');
              var btn = $('<button class="red-ui-button red-ui-button-small" style="padding:0 6px;font-size:10px;">Select</button>');
              btn.on('click', function (e) { e.stopPropagation(); selectAddress(a.address); });
              var td = $('<td style="padding:2px 4px;text-align:right;"></td>').append(btn);
              tr.append(td);
              tr.on('click', function () { btn.trigger('click'); });
              tbl.append(tr);
            });
            if (shown > 100) {
              tbl.append('<tr><td colspan="3" style="padding:4px;color:#999;font-size:11px;">' + (filtered.length - 100) + ' more... use filter</td></tr>');
            }
            body.append(tbl);
            section.append(body);

            header.on('click', function () {
              var visible = body.is(':visible');
              body.slideToggle(150);
              arrow.css('transform', visible ? '' : 'rotate(90deg)');
            });

            container.append(section);
          });

          if (totalCount === 0) {
            container.append('<div style="padding:8px;color:#999;">No matches</div>');
          }
          $(opts.resultsId).empty().append(container);
        }

        render('');
        $(opts.filterId).off('input').on('input', function () { render($(this).val()); });
      }).fail(function (xhr) {
        var msg = xhr.responseJSON ? xhr.responseJSON.error : 'Browse failed';
        $(opts.statusId).text(msg).css('color', 'red');
      });
    });
    $(opts.closeId).on('click', function () { $(opts.dialogId).hide(); });
  };

  // ===== Config node registration =====
  RED.nodes.registerType('s7-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      host: { value: '192.168.0.1', required: true },
      port: { value: 102, required: true, validate: RED.validators.number() },
      rack: { value: 0, required: true, validate: RED.validators.number() },
      slot: { value: 1, required: true, validate: RED.validators.number() },
      plcType: { value: 'S7-1200' },
      backend: { value: 'nodes7' },
      localTSAP: { value: '' },
      remoteTSAP: { value: '' },
      connectionTimeout: { value: 5000, validate: RED.validators.number() },
      requestTimeout: { value: 3000, validate: RED.validators.number() },
      reconnectInterval: { value: 1000, validate: RED.validators.number() },
      maxReconnectInterval: { value: 30000, validate: RED.validators.number() }
    },
    label: function () {
      return this.name || this.host + ':' + this.port;
    },
    oneditprepare: function () {
      var plcDefaults = {};
      $.getJSON('s7-suite/plc-defaults', function (data) {
        plcDefaults = data;
      });
      $.getJSON('s7-suite/snap7-available', function (data) {
        if (!data.available) {
          $('#snap7-warning').show();
        }
      });
      $('#node-config-input-plcType').on('change', function () {
        var plcType = $(this).val();
        if (plcDefaults[plcType] !== undefined) {
          $('#node-config-input-slot').val(plcDefaults[plcType]);
        }
        if (plcType === 'LOGO') {
          $('.tsap-row').show();
        } else {
          $('.tsap-row').hide();
        }
      });
      $('#node-config-input-backend').on('change', function () {
        if ($(this).val() === 'snap7') {
          $.getJSON('s7-suite/snap7-available', function (data) {
            if (!data.available) {
              $('#snap7-warning').show();
            } else {
              $('#snap7-warning').hide();
            }
          });
        } else {
          $('#snap7-warning').hide();
        }
      });
    }
  });
</script>

<script type="text/html" data-template-name="s7-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-config-input-host"><i class="fa fa-globe"></i> Host</label>
    <input type="text" id="node-config-input-host" placeholder="192.168.0.1">
  </div>
  <div class="form-row">
    <label for="node-config-input-port"><i class="fa fa-plug"></i> Port</label>
    <input type="number" id="node-config-input-port" placeholder="102">
  </div>
  <div class="form-row">
    <label for="node-config-input-plcType"><i class="fa fa-microchip"></i> PLC Type</label>
    <select id="node-config-input-plcType">
      <option value="S7-200">S7-200</option>
      <option value="S7-300">S7-300</option>
      <option value="S7-400">S7-400</option>
      <option value="S7-1200">S7-1200</option>
      <option value="S7-1500">S7-1500</option>
      <option value="LOGO">LOGO</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-rack"><i class="fa fa-server"></i> Rack</label>
    <input type="number" id="node-config-input-rack" placeholder="0">
  </div>
  <div class="form-row">
    <label for="node-config-input-slot"><i class="fa fa-th"></i> Slot</label>
    <input type="number" id="node-config-input-slot" placeholder="1">
  </div>
  <div class="form-row">
    <label for="node-config-input-backend"><i class="fa fa-cogs"></i> Backend</label>
    <select id="node-config-input-backend">
      <option value="sim">Simulator (no PLC needed)</option>
      <option value="nodes7">nodes7 (pure JS)</option>
      <option value="snap7">snap7 (native C)</option>
    </select>
  </div>
  <div id="snap7-warning" class="form-row" style="display:none;">
    <div class="form-tips"><i class="fa fa-warning"></i> node-snap7 is not installed. Install it with: <code>npm install node-snap7</code></div>
  </div>
  <div class="form-row tsap-row" style="display:none;">
    <label for="node-config-input-localTSAP"><i class="fa fa-exchange"></i> Local TSAP</label>
    <input type="text" id="node-config-input-localTSAP" placeholder="0x0100">
  </div>
  <div class="form-row tsap-row" style="display:none;">
    <label for="node-config-input-remoteTSAP"><i class="fa fa-exchange"></i> Remote TSAP</label>
    <input type="text" id="node-config-input-remoteTSAP" placeholder="0x0200">
  </div>
  <div class="form-row">
    <label for="node-config-input-connectionTimeout"><i class="fa fa-clock-o"></i> Conn. Timeout (ms)</label>
    <input type="number" id="node-config-input-connectionTimeout" placeholder="5000">
  </div>
  <div class="form-row">
    <label for="node-config-input-requestTimeout"><i class="fa fa-clock-o"></i> Req. Timeout (ms)</label>
    <input type="number" id="node-config-input-requestTimeout" placeholder="3000">
  </div>
  <div class="form-row">
    <label for="node-config-input-reconnectInterval"><i class="fa fa-refresh"></i> Reconnect (ms)</label>
    <input type="number" id="node-config-input-reconnectInterval" placeholder="1000">
  </div>
  <div class="form-row">
    <label for="node-config-input-maxReconnectInterval"><i class="fa fa-refresh"></i> Max Reconnect (ms)</label>
    <input type="number" id="node-config-input-maxReconnectInterval" placeholder="30000">
  </div>
</script>
