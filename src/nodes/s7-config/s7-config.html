<script type="text/javascript">
  // ===== Shared S7 Suite functions (loaded once via config node) =====

  // Connection status dot - polls state every 3s while editor is open
  window.s7SuiteStatusDot = function (serverSelectId, dotId) {
    var interval = null;
    function update() {
      var id = $(serverSelectId).val();
      if (!id) { $(dotId).css('background', '#999').attr('title', 'No server selected'); return; }
      $.getJSON('s7-suite/connection-state/' + id, function (data) {
        var colors = { connected: '#4CAF50', connecting: '#FFC107', reconnecting: '#FFC107', error: '#F44336', disconnected: '#999' };
        $(dotId).css('background', colors[data.state] || '#999').attr('title', data.state || 'unknown');
      }).fail(function () {
        $(dotId).css('background', '#999').attr('title', 'unknown');
      });
    }
    update();
    interval = setInterval(update, 3000);
    $(serverSelectId).on('change', update);
    // Cleanup when editor closes (RED will destroy elements)
    setTimeout(function () {
      var check = setInterval(function () {
        if ($(dotId).length === 0) { clearInterval(interval); clearInterval(check); }
      }, 2000);
    }, 1000);
  };

  // Browse dialog with tree/category structure
  // opts: { btnId, closeId, filterId, statusId, resultsId, dialogId, serverId, addressId, mode: 'replace'|'append'|'list', listRef }
  window.s7SuiteBrowseDialog = function (opts) {
    function fetchAndRenderBrowse() {
      var serverId = $(opts.serverId).val();
      if (!serverId) { RED.notify('Select a server first', 'warning'); return; }
      $(opts.statusId).text('Browsing...').css('color', '#666').show();
      $(opts.resultsId).empty();
      $(opts.dialogId).show();
      $.getJSON('s7-suite/browse/' + serverId, function (data) {
        $(opts.statusId).hide();
        var addresses = data.addresses || [];

        // Group into categories
        var groups = {};
        addresses.forEach(function (a) {
          var cat = a.info || 'Other';
          // Extract DB name for grouping: "DB1 (100 bytes)" -> "DB1"
          var m = cat.match(/^(DB\d+)/);
          if (m) cat = m[1] + ' (' + (a.info || '') + ')';
          else if (cat === 'Merker') cat = 'Merker (M)';
          else if (cat === 'Input') cat = 'Inputs (I)';
          else if (cat === 'Output') cat = 'Outputs (Q)';
          else if (cat === 'Counter') cat = 'Counters (C)';
          else if (cat === 'Timer') cat = 'Timers (T)';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(a);
        });

        function selectAddress(addr) {
          if (opts.mode === 'list' && opts.listRef) {
            opts.listRef.editableList('addItem', { address: addr });
            RED.notify('Added: ' + addr, 'success');
          } else if (opts.mode === 'append') {
            var cur = $(opts.addressId).val().trim();
            if (cur) cur += ' ';
            $(opts.addressId).val(cur + addr);
            RED.notify('Added: ' + addr, 'success');
          } else {
            $(opts.addressId).val(addr);
            $(opts.dialogId).hide();
          }
        }

        function render(f) {
          var container = $('<div></div>');
          var totalCount = 0;
          var sortedKeys = Object.keys(groups).sort(function (a, b) {
            // DBs first (sorted numerically), then M, I, Q
            var da = a.match(/^DB(\d+)/), db2 = b.match(/^DB(\d+)/);
            if (da && db2) return parseInt(da[1]) - parseInt(db2[1]);
            if (da) return -1;
            if (db2) return 1;
            return a.localeCompare(b);
          });

          sortedKeys.forEach(function (cat) {
            var items = groups[cat];
            var filtered = f ? items.filter(function (a) {
              return a.address.toLowerCase().indexOf(f.toLowerCase()) !== -1 ||
                     a.type.toLowerCase().indexOf(f.toLowerCase()) !== -1 ||
                     (a.info && a.info.toLowerCase().indexOf(f.toLowerCase()) !== -1);
            }) : items;
            if (filtered.length === 0) return;

            // Category header (collapsible)
            var section = $('<div style="margin-bottom:2px;"></div>');
            var header = $('<div style="background:#e3f2fd;padding:4px 8px;cursor:pointer;border-radius:3px;font-weight:bold;font-size:12px;display:flex;align-items:center;user-select:none;"></div>');
            var arrow = $('<i class="fa fa-caret-right" style="margin-right:6px;width:10px;transition:transform 0.2s;"></i>');
            header.append(arrow);
            header.append('<span>' + cat + ' <span style="color:#888;font-weight:normal;">(' + filtered.length + ')</span></span>');
            section.append(header);

            var body = $('<div style="display:none;"></div>');
            var tbl = $('<table style="width:100%;border-collapse:collapse;font-size:12px;"></table>');

            var shown = 0;
            filtered.forEach(function (a) {
              if (shown++ >= 100) return;
              totalCount++;
              var tr = $('<tr style="border-bottom:1px solid #eee;cursor:pointer;"></tr>');
              tr.on('mouseover', function () { $(this).css('background', '#f5f5f5'); });
              tr.on('mouseout', function () { $(this).css('background', ''); });
              tr.append($('<td style="padding:2px 4px;font-family:monospace;font-size:11px;"></td>').text(a.address));
              tr.append($('<td style="padding:2px 4px;text-align:center;color:#1565C0;font-size:11px;"></td>').text(a.type));
              var valTd = $('<td style="padding:2px 4px;text-align:right;font-family:monospace;font-size:11px;white-space:nowrap;"></td>');
              if (a.value === null || a.value === undefined) {
                valTd.append($('<span style="color:#999;"></span>').text('-'));
              } else if (typeof a.value === 'boolean') {
                valTd.append($('<span></span>').css('color', a.value ? '#4CAF50' : '#F44336').text(String(a.value)));
              } else if (typeof a.value === 'number') {
                var numStr = (a.value % 1 !== 0) ? a.value.toFixed(4).replace(/0+$/, '').replace(/\.$/, '') : String(a.value);
                valTd.css('color', '#333').text(numStr);
              } else {
                valTd.css('color', '#333').text(String(a.value));
              }
              tr.append(valTd);
              var btn = $('<button class="red-ui-button red-ui-button-small" style="padding:0 6px;font-size:10px;">Select</button>');
              btn.on('click', function (e) { e.stopPropagation(); selectAddress(a.address); });
              var td = $('<td style="padding:2px 4px;text-align:right;"></td>').append(btn);
              tr.append(td);
              tr.on('click', function () { btn.trigger('click'); });
              tbl.append(tr);
            });
            if (shown > 100) {
              tbl.append('<tr><td colspan="4" style="padding:4px;color:#999;font-size:11px;">' + (filtered.length - 100) + ' more... use filter</td></tr>');
            }
            body.append(tbl);
            section.append(body);

            header.on('click', function () {
              var visible = body.is(':visible');
              body.slideToggle(150);
              arrow.css('transform', visible ? '' : 'rotate(90deg)');
            });

            container.append(section);
          });

          if (totalCount === 0) {
            container.append('<div style="padding:8px;color:#999;">No matches</div>');
          }
          $(opts.resultsId).empty().append(container);
        }

        render('');
        $(opts.filterId).off('input').on('input', function () { render($(this).val()); });
      }).fail(function (xhr) {
        var msg = xhr.responseJSON ? xhr.responseJSON.error : 'Browse failed';
        $(opts.statusId).text(msg).css('color', 'red');
      });
    }

    $(opts.btnId).on('click', function () { fetchAndRenderBrowse(); });
    $(opts.closeId).on('click', function () { $(opts.dialogId).hide(); });
    // Refresh button support: if opts.refreshId is provided, bind it
    if (opts.refreshId) {
      $(opts.refreshId).on('click', function () { fetchAndRenderBrowse(); });
    }
  };

  // ===== Config node registration =====
  RED.nodes.registerType('s7-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      host: { value: '192.168.0.1', required: true },
      port: { value: 102, required: true, validate: RED.validators.number() },
      rack: { value: 0, required: true, validate: RED.validators.number() },
      slot: { value: 1, required: true, validate: RED.validators.number() },
      plcType: { value: 'S7-1200' },
      backend: { value: 'nodes7' },
      localTSAP: { value: '' },
      remoteTSAP: { value: '' },
      connectionTimeout: { value: 5000, validate: RED.validators.number() },
      requestTimeout: { value: 3000, validate: RED.validators.number() },
      reconnectInterval: { value: 1000, validate: RED.validators.number() },
      maxReconnectInterval: { value: 30000, validate: RED.validators.number() }
    },
    credentials: {
      password: { type: 'password' }
    },
    label: function () {
      return this.name || this.host + ':' + this.port;
    },
    oneditprepare: function () {
      var plcDefaults = {};
      $.getJSON('s7-suite/plc-defaults', function (data) {
        plcDefaults = data;
      });
      $.getJSON('s7-suite/snap7-available', function (data) {
        if (!data.available) {
          $('#snap7-warning').show();
        }
      });
      $('#node-config-input-plcType').on('change', function () {
        var plcType = $(this).val();
        if (plcDefaults[plcType] !== undefined) {
          $('#node-config-input-slot').val(plcDefaults[plcType]);
        }
        $('.tsap-row').show();
      });
      function updateBackendInfo() {
        var val = $('#node-config-input-backend').val();
        $('#backend-info-sim, #backend-info-nodes7, #backend-info-snap7').hide();
        $('#backend-info-' + val).show();
        if (val === 'snap7') {
          $.getJSON('s7-suite/snap7-available', function (data) {
            if (!data.available) { $('#snap7-warning').show(); } else { $('#snap7-warning').hide(); }
          });
        } else {
          $('#snap7-warning').hide();
        }
      }
      $('#node-config-input-backend').on('change', updateBackendInfo);
      setTimeout(updateBackendInfo, 200);
    }
  });
</script>

<script type="text/html" data-template-name="s7-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Name">
  </div>
  <div class="form-row">
    <label for="node-config-input-host"><i class="fa fa-globe"></i> Host</label>
    <input type="text" id="node-config-input-host" placeholder="192.168.0.1">
  </div>
  <div class="form-row">
    <label for="node-config-input-port"><i class="fa fa-plug"></i> Port</label>
    <input type="number" id="node-config-input-port" placeholder="102">
  </div>
  <div class="form-row">
    <label for="node-config-input-plcType"><i class="fa fa-microchip"></i> PLC Type</label>
    <select id="node-config-input-plcType">
      <option value="S7-200">S7-200</option>
      <option value="S7-300">S7-300</option>
      <option value="S7-400">S7-400</option>
      <option value="S7-1200">S7-1200</option>
      <option value="S7-1500">S7-1500</option>
      <option value="LOGO">LOGO</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-rack"><i class="fa fa-server"></i> Rack</label>
    <input type="number" id="node-config-input-rack" placeholder="0">
  </div>
  <div class="form-row">
    <label for="node-config-input-slot"><i class="fa fa-th"></i> Slot</label>
    <input type="number" id="node-config-input-slot" placeholder="1">
  </div>
  <div class="form-row">
    <label for="node-config-input-backend"><i class="fa fa-cogs"></i> Backend</label>
    <select id="node-config-input-backend">
      <option value="sim">Simulator &mdash; no PLC needed, generates test data</option>
      <option value="nodes7">nodes7 &mdash; pure JS, works everywhere, no block listing</option>
      <option value="snap7">snap7 &mdash; native C, fast, block listing &amp; SZL reads</option>
    </select>
  </div>
  <div id="snap7-warning" class="form-row" style="display:none;">
    <div class="form-tips"><i class="fa fa-warning"></i> <b>node-snap7</b> is not installed. It is an optional native C library that requires a C compiler to build.<br>
    Install: <code>npm install node-snap7</code><br>
    <small>If compilation fails, install build tools first (e.g. <code>apt install build-essential</code> on Debian/Ubuntu).<br>
    Without snap7, use the <b>nodes7</b> backend instead &mdash; it supports the same Read/Write/Trigger features, only block listing and SZL reads are unavailable.</small></div>
  </div>
  <div id="backend-info" class="form-row" style="margin-left:20px;">
    <div id="backend-info-sim" class="form-tips" style="display:none;">
      <b>Simulator:</b> Generates dynamic test data (sine wave, counter, sawtooth) without a real PLC. Useful for flow development and testing.
    </div>
    <div id="backend-info-nodes7" class="form-tips" style="display:none;">
      <b>nodes7:</b> Pure JavaScript &mdash; works on any platform without compilation. Supports all Read/Write/Trigger operations. Browse uses probe-based discovery (slower). Does not support block listing or SZL reads.
    </div>
    <div id="backend-info-snap7" class="form-tips" style="display:none;">
      <b>snap7:</b> Native C library via node-snap7 &mdash; supports all features including fast block listing, SZL reads, and CPU diagnostics. Requires a C compiler for installation.
    </div>
  </div>
  <div class="form-row">
    <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
    <input type="password" id="node-config-input-password" placeholder="Session password (optional)">
  </div>
  <div class="form-tips" style="margin-left:20px;">
    <small>PLC session password. Only used with the <b>snap7</b> backend.</small>
  </div>
  <div class="form-row tsap-row">
    <label for="node-config-input-localTSAP"><i class="fa fa-exchange"></i> Local TSAP</label>
    <input type="text" id="node-config-input-localTSAP" placeholder="0x0100">
  </div>
  <div class="form-row tsap-row">
    <label for="node-config-input-remoteTSAP"><i class="fa fa-exchange"></i> Remote TSAP</label>
    <input type="text" id="node-config-input-remoteTSAP" placeholder="0x0200">
  </div>
  <div class="form-row">
    <label for="node-config-input-connectionTimeout"><i class="fa fa-clock-o"></i> Conn. Timeout (ms)</label>
    <input type="number" id="node-config-input-connectionTimeout" placeholder="5000">
  </div>
  <div class="form-row">
    <label for="node-config-input-requestTimeout"><i class="fa fa-clock-o"></i> Req. Timeout (ms)</label>
    <input type="number" id="node-config-input-requestTimeout" placeholder="3000">
  </div>
  <div class="form-row">
    <label for="node-config-input-reconnectInterval"><i class="fa fa-refresh"></i> Reconnect (ms)</label>
    <input type="number" id="node-config-input-reconnectInterval" placeholder="1000">
  </div>
  <div class="form-row">
    <label for="node-config-input-maxReconnectInterval"><i class="fa fa-refresh"></i> Max Reconnect (ms)</label>
    <input type="number" id="node-config-input-maxReconnectInterval" placeholder="30000">
  </div>
</script>

<script type="text/html" data-help-name="s7-config">
  <p>Configuration node for Siemens S7 PLC connections.</p>
  <h3>Properties</h3>
  <dl class="message-properties">
    <dt>Host <span class="property-type">string</span></dt>
    <dd>IP address or hostname of the PLC</dd>
    <dt>Port <span class="property-type">number</span></dt>
    <dd>TCP port (default: 102)</dd>
    <dt>Rack / Slot <span class="property-type">number</span></dt>
    <dd>PLC rack and slot numbers. Slot is auto-set based on PLC type.</dd>
    <dt>PLC Type <span class="property-type">select</span></dt>
    <dd>S7-200, S7-300, S7-400, S7-1200, S7-1500, or LOGO</dd>
    <dt>Backend <span class="property-type">select</span></dt>
    <dd>Communication library to use</dd>
  </dl>
  <h3>Backends</h3>
  <table style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead>
      <tr style="background:#e3f2fd;">
        <th style="padding:4px 8px;text-align:left;border-bottom:2px solid #90CAF9;">Feature</th>
        <th style="padding:4px 8px;text-align:center;border-bottom:2px solid #90CAF9;">Simulator</th>
        <th style="padding:4px 8px;text-align:center;border-bottom:2px solid #90CAF9;">nodes7</th>
        <th style="padding:4px 8px;text-align:center;border-bottom:2px solid #90CAF9;">snap7</th>
      </tr>
    </thead>
    <tbody>
      <tr><td style="padding:3px 8px;">Language</td><td style="text-align:center;">JS (built-in)</td><td style="text-align:center;">Pure JS</td><td style="text-align:center;">Native C</td></tr>
      <tr><td style="padding:3px 8px;">Requires PLC</td><td style="text-align:center;">No</td><td style="text-align:center;">Yes</td><td style="text-align:center;">Yes</td></tr>
      <tr><td style="padding:3px 8px;">Requires C compiler</td><td style="text-align:center;">No</td><td style="text-align:center;">No</td><td style="text-align:center;">Yes</td></tr>
      <tr><td style="padding:3px 8px;">Read / Write</td><td style="text-align:center;">Yes</td><td style="text-align:center;">Yes</td><td style="text-align:center;">Yes</td></tr>
      <tr><td style="padding:3px 8px;">Trigger (polling)</td><td style="text-align:center;">Yes</td><td style="text-align:center;">Yes</td><td style="text-align:center;">Yes</td></tr>
      <tr><td style="padding:3px 8px;">Browse (block listing)</td><td style="text-align:center;">Simulated</td><td style="text-align:center;">Probe-based (slow)</td><td style="text-align:center;">Native API (fast)</td></tr>
      <tr><td style="padding:3px 8px;">SZL / CPU diagnostics</td><td style="text-align:center;">Simulated</td><td style="text-align:center;">No</td><td style="text-align:center;">Yes</td></tr>
      <tr><td style="padding:3px 8px;">Best for</td><td style="text-align:center;">Development</td><td style="text-align:center;">Production (easy setup)</td><td style="text-align:center;">Production (full features)</td></tr>
    </tbody>
  </table>
  <p style="margin-top:8px;"><b>Recommendation:</b> Use <b>nodes7</b> if you just need Read/Write/Trigger &mdash; it works everywhere without compilation.
  Use <b>snap7</b> if you need block listing, CPU diagnostics, or SZL reads.
  Use <b>Simulator</b> for development and testing without a PLC.</p>
  <p><code>node-snap7</code> is listed as an optional dependency. If compilation fails during <code>npm install</code>,
  the package still installs successfully &mdash; only the snap7 backend will be unavailable.</p>
  <h3>TSAP Configuration (LOGO)</h3>
  <p>For Siemens LOGO PLCs, use TSAP addresses instead of rack/slot:</p>
  <ul>
    <li><b>Local TSAP:</b> e.g. <code>0x0100</code></li>
    <li><b>Remote TSAP:</b> e.g. <code>0x0200</code></li>
  </ul>
  <h3>Connection Settings</h3>
  <ul>
    <li><b>Connection Timeout:</b> Maximum time to establish connection (ms)</li>
    <li><b>Request Timeout:</b> Maximum time for a read/write request (ms)</li>
    <li><b>Reconnect Interval:</b> Initial delay before reconnection attempt (ms)</li>
    <li><b>Max Reconnect Interval:</b> Maximum delay with exponential backoff (ms)</li>
  </ul>
</script>
